<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex, follow">
  <title>Page Not Found | Roanoke Baptist Church</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <style>
    :root { color-scheme: light only; }
    @media (prefers-color-scheme: dark) { html, body { background: #fbf6f4 !important; color: #2a1f1f !important; } }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Source Sans 3', system-ui, sans-serif; background: #fbf6f4; color: #2a1f1f;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .wrap { max-width: 480px; }
    .code { font-family: Georgia, serif; font-size: 5rem; font-weight: 700; color: #8c0104; line-height: 1; }
    .rule { width: 60px; height: 3px; background: #c9a24a; margin: 14px auto 22px; border-radius: 2px; }
    h1 { font-family: Georgia, serif; font-size: 1.6rem; color: #1f1f22; margin-bottom: 10px; }
    p { color: #6b5757; font-size: 1.05rem; line-height: 1.6; margin-bottom: 26px; }
    a.home { display: inline-block; background: #8c0104; color: #fff; text-decoration: none; padding: 12px 28px;
      border-radius: 8px; font-weight: 600; border: 1px solid #6e0103; }
    a.home:hover { background: #6e0103; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="rule"></div>
    <h1>We couldn't find that page</h1>
    <p>The page you were looking for may have moved. Let's get you back to where you can find service times, our beliefs, and how to visit.</p>
    <a class="home" href="/">Return Home</a>
  </div>
</body>
</html>
